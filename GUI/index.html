<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="cache-control" content="no-cache">
  <title>GitHub Video Maker Bot — Dashboard</title>
  <meta name="description" content="Create engaging short-form videos about trending GitHub repositories with AI-powered narration.">
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
</head>
<body>
  <div class="app-layout">
    <!-- ═══ Sidebar ═══ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <a href="#/" class="logo">
          <div class="logo-icon">🎬</div>
          <div class="logo-text">
            GitHub Video Bot
            <small>v4.0 Dashboard</small>
          </div>
        </a>
      </div>

      <nav class="sidebar-nav">
        <ul style="list-style:none; padding:0; margin:0">
          <li class="nav-item">
            <a class="nav-link active" data-route="/" href="#/">
              <span class="nav-icon">🏠</span>
              Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-route="/create" href="#/create">
              <span class="nav-icon">▶️</span>
              Create Video
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-route="/history" href="#/history">
              <span class="nav-icon">📚</span>
              Video Library
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-route="/backgrounds" href="#/backgrounds">
              <span class="nav-icon">🎨</span>
              Backgrounds
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-route="/settings" href="#/settings">
              <span class="nav-icon">⚙️</span>
              Settings
            </a>
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <div class="status-badge">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">Ready</span>
        </div>
      </div>
    </aside>

    <!-- ═══ Main Content ═══ -->
    <main class="main-content" id="main-content">
      <!-- SPA pages render here -->
      <div class="page-view" id="page-view">
        <div style="display:flex; align-items:center; justify-content:center; min-height:60vh">
          <div class="spinner spinner-lg"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- JavaScript -->
  <script src="/static/js/app.js"></script>
</body>
</html>
