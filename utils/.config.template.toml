[github]
trending_language = { optional = true, default = "", explanation = "Filter trending repos by programming language (e.g. 'python', 'javascript'). Leave empty for all languages.", example = "python" }
trending_since = { optional = true, default = "daily", options = ["daily", "weekly", "monthly"], explanation = "Time range for trending repos.", example = "daily" }
min_stars = { optional = true, default = 100, type = "int", nmin = 0, explanation = "Minimum star count to include a repo.", example = 100 }
repos_per_run = { optional = true, default = 1, type = "int", nmin = 1, nmax = 10, explanation = "How many repos to process per invocation.", example = 1 }

[github.api]
token = { optional = true, default = "", explanation = "GitHub Personal Access Token for higher API rate limits. Leave empty for unauthenticated requests (60 req/hr).", example = "ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" }

[script]
provider = { optional = true, default = "openai", options = ["openai"], explanation = "LLM provider for narration script generation.", example = "openai" }
openai_api_key = { optional = false, explanation = "OpenAI API key for script generation.", example = "sk-abc123def456..." }
openai_model = { optional = true, default = "gpt-4o-mini", explanation = "OpenAI model to use for script generation.", example = "gpt-4o-mini", options = ["gpt-4o-mini", "gpt-4o", "gpt-3.5-turbo"] }
max_script_words = { optional = true, default = 75, type = "int", nmin = 30, nmax = 500, explanation = "Target word count for the narration script.", example = 75 }
custom_prompt = { optional = true, default = "", explanation = "Custom system prompt for script generation. Leave empty to use the default prompt.", example = "" }

[settings]
allow_nsfw = { optional = false, type = "bool", default = false, example = false, options = [true, false, ], explanation = "Whether to allow NSFW content, True or False" }
theme = { optional = false, default = "dark", example = "dark", options = ["dark", "light"], explanation = "Sets the screenshot theme, either LIGHT or DARK." }
times_to_run = { optional = false, default = 1, example = 1, explanation = "How many repos to process in a single run. Set to an int e.g. 1.", type = "int", nmin = 1, oob_error = "It's very hard to run something less than once." }
opacity = { optional = false, default = 0.9, example = 0.8, explanation = "Sets the opacity of the screenshots when overlayed over the background", type = "float", nmin = 0, nmax = 1, oob_error = "The opacity HAS to be between 0 and 1", input_error = "The opacity HAS to be a decimal number between 0 and 1" }
storymode = { optional = true, type = "bool", default = true, example = true, options = [true, false,], explanation = "Always true for GitHub mode — uses script segments as story content." }
storymodemethod = { optional = true, default = 1, example = 1, explanation = "Style for the storymode. Set to 1 for fancy looking video with per-segment images.", type = "int", nmin = 0, options = [0, 1] }
resolution_w = { optional = false, default = 1080, example = 1080, explantation = "Sets the width in pixels of the final video" }
resolution_h = { optional = false, default = 1920, example = 1920, explantation = "Sets the height in pixels of the final video" }
zoom = { optional = true, default = 1, example = 1.1, explanation = "Sets the browser zoom level.", type = "float", nmin = 0.1, nmax = 2 }
channel_name = { optional = true, default = "GitHub Spotlight", example = "GitHub Spotlight", explanation = "Sets the channel name displayed on the video" }

[settings.background]
background_audio = { optional = true, default = "lofi", example = "chill-summer", options = ["lofi","lofi-2","chill-summer",""], explanation = "Sets the background audio for the video" }
background_audio_volume = { optional = true, type = "float", nmin = 0, nmax = 1, default = 0.4, example = 0.4, explanation="Sets the volume of the background audio. Set to 0 for no background audio.", oob_error = "The volume HAS to be between 0 and 1" }
enable_extra_audio = { optional = true, type = "bool", default = false, example = false, explanation="Render another video without background audio in a separate folder" }
background_thumbnail = { optional = true, type = "bool", default = false, example = false, options = [true, false,], explanation = "Generate a thumbnail for the video" }
background_thumbnail_font_family = { optional = true, default = "arial", example = "arial", explanation = "Font family for the thumbnail text" }
background_thumbnail_font_size = { optional = true, type = "int", default = 96, example = 96, explanation = "Font size in pixels for the thumbnail text" }
background_thumbnail_font_color = { optional = true, default = "255,255,255", example = "255,255,255", explanation = "Font color in RGB format for the thumbnail text" }

[settings.tts]
voice_choice = { optional = false, default = "googletranslate", options = ["elevenlabs", "streamlabspolly", "tiktok", "googletranslate", "awspolly", "pyttsx", "OpenAI"], example = "googletranslate", explanation = "The voice platform used for TTS generation." }
random_voice = { optional = false, type = "bool", default = false, example = false, options = [true, false,], explanation = "Randomizes the voice used for each segment" }
elevenlabs_voice_name = { optional = false, default = "Bella", example = "Bella", explanation = "The voice used for elevenlabs", options = ["Adam", "Antoni", "Arnold", "Bella", "Domi", "Elli", "Josh", "Rachel", "Sam", ] }
elevenlabs_api_key = { optional = true, example = "21f13f91f54d741e2ae27d2ab1b99d59", explanation = "Elevenlabs API key" }
aws_polly_voice = { optional = false, default = "Matthew", example = "Matthew", explanation = "The voice used for AWS Polly" }
streamlabs_polly_voice = { optional = false, default = "Matthew", example = "Matthew", explanation = "The voice used for Streamlabs Polly" }
tiktok_voice = { optional = true, default = "en_us_001", example = "en_us_006", explanation = "The voice used for TikTok TTS" }
tiktok_sessionid = { optional = true, example = "c76bcc3a7625abcc27b508c7db457ff1", explanation = "TikTok sessionid for TTS. Check documentation for how to obtain." }
python_voice = { optional = false, default = "1", example = "1", explanation = "The index of the system tts voices" }
py_voice_num = { optional = false, default = "2", example = "2", explanation = "The number of system voices" }
silence_duration = { optional = true, example = "0.1", explanation = "Time in seconds between TTS segments", default = 0.3, type = "float" }
no_emojis = { optional = false, type = "bool", default = true, example = true, options = [true, false,], explanation = "Whether to remove emojis from the script" }
openai_api_url = { optional = true, default = "https://api.openai.com/v1/", example = "https://api.openai.com/v1/", explanation = "The API endpoint URL for OpenAI TTS generation" }
openai_api_key = { optional = true, example = "sk-abc123def456...", explanation = "Your OpenAI API key for TTS generation" }
openai_voice_name = { optional = false, default = "alloy", example = "alloy", explanation = "The voice used for OpenAI TTS generation", options = ["alloy", "ash", "coral", "echo", "fable", "onyx", "nova", "sage", "shimmer", "af_heart"] }
openai_model = { optional = false, default = "tts-1", example = "tts-1", explanation = "The model variant used for OpenAI TTS generation", options = ["tts-1", "tts-1-hd", "gpt-4o-mini-tts"] }
